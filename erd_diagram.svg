<svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="520" fill="#fafafa"/>
  <text x="20" y="24" font-size="16" font-weight="bold" fill="#222222">Instagram Reels ERD</text>

  <!-- ================= Relationship lines (drawn first, under boxes) ================= -->
  <g stroke="#555555" stroke-width="1.5" fill="none">
    <line x1="280" y1="120" x2="380" y2="144" marker-end="url(#arrow)"/>
    <line x1="160" y1="200" x2="160" y2="300" marker-end="url(#arrow)"/>
    <polyline points="240,200 240,260 460,260 460,300" marker-end="url(#arrow)"/>
    <line x1="560" y1="248" x2="560" y2="300" marker-end="url(#arrow)"/>
    <polyline points="420,248 420,280 220,280 220,300" marker-end="url(#arrow)"/>
    <polyline points="640,160 900,160 900,300" marker-end="url(#arrow)"/>
    <line x1="850" y1="128" x2="850" y2="300" marker-end="url(#arrow)"/>
  </g>

  <g font-size="11" fill="#444444">
    <text x="285" y="115">1:N (reels.user_id)</text>
    <text x="165" y="252">1:N (likes.user_id)</text>
    <text x="285" y="255">1:N (comments.user_id)</text>
    <text x="565" y="272">1:N (comments.reel_id)</text>
    <text x="245" y="273">1:N (likes.reel_id)</text>
    <text x="700" y="152">1:N (reel_hashtags.reel_id)</text>
    <text x="855" y="212">1:N (reel_hashtags.hashtag_id)</text>
  </g>

  <!-- ================= users ================= -->
  <g>
    <rect x="40" y="40" width="240" height="160" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <rect x="40" y="40" width="240" height="30" fill="#4a6fa5"/>
    <text x="160" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">users</text>
    <g font-size="11" font-family="Consolas, Menlo, monospace" fill="#222222">
      <text x="50" y="88">PK  user_id       INTEGER</text>
      <text x="50" y="112">   username     TEXT NOT NULL, UNIQUE</text>
      <text x="50" y="136">   email        TEXT NOT NULL, UNIQUE</text>
      <text x="50" y="160">   full_name    TEXT</text>
      <text x="50" y="184">   created_at   DATE NOT NULL</text>
    </g>
  </g>

  <!-- ================= reels ================= -->
  <g>
    <rect x="380" y="40" width="260" height="208" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <rect x="380" y="40" width="260" height="30" fill="#7a5ea8"/>
    <text x="510" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">reels</text>
    <g font-size="11" font-family="Consolas, Menlo, monospace" fill="#222222">
      <text x="390" y="88">PK  reel_id           INTEGER</text>
      <text x="390" y="112">FK  user_id           INTEGER -&gt; users</text>
      <text x="390" y="136">   caption           TEXT</text>
      <text x="390" y="160">   video_url         TEXT NOT NULL</text>
      <text x="390" y="184">   duration_seconds  INTEGER NOT NULL</text>
      <text x="390" y="208">   view_count        INTEGER NOT NULL</text>
      <text x="390" y="232">   upload_date       DATE NOT NULL</text>
    </g>
  </g>

  <!-- ================= hashtags ================= -->
  <g>
    <rect x="740" y="40" width="220" height="88" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <rect x="740" y="40" width="220" height="30" fill="#3f9d8f"/>
    <text x="850" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">hashtags</text>
    <g font-size="11" font-family="Consolas, Menlo, monospace" fill="#222222">
      <text x="750" y="88">PK  hashtag_id   INTEGER</text>
      <text x="750" y="112">   tag_name     TEXT NOT NULL, UNIQUE</text>
    </g>
  </g>

  <!-- ================= likes ================= -->
  <g>
    <rect x="40" y="300" width="240" height="136" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <rect x="40" y="300" width="240" height="30" fill="#d1883f"/>
    <text x="160" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">likes</text>
    <g font-size="11" font-family="Consolas, Menlo, monospace" fill="#222222">
      <text x="50" y="348">PK  like_id    INTEGER</text>
      <text x="50" y="372">FK  user_id    INTEGER -&gt; users</text>
      <text x="50" y="396">FK  reel_id    INTEGER -&gt; reels</text>
      <text x="50" y="420">   liked_at   DATETIME NOT NULL</text>
    </g>
  </g>

  <!-- ================= comments ================= -->
  <g>
    <rect x="380" y="300" width="260" height="160" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <rect x="380" y="300" width="260" height="30" fill="#4a9d5f"/>
    <text x="510" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">comments</text>
    <g font-size="11" font-family="Consolas, Menlo, monospace" fill="#222222">
      <text x="390" y="348">PK  comment_id     INTEGER</text>
      <text x="390" y="372">FK  user_id        INTEGER -&gt; users</text>
      <text x="390" y="396">FK  reel_id        INTEGER -&gt; reels</text>
      <text x="390" y="420">   content         TEXT NOT NULL</text>
      <text x="390" y="444">   commented_at    DATETIME NOT NULL</text>
    </g>
  </g>

  <!-- ================= reel_hashtags ================= -->
  <g>
    <rect x="740" y="300" width="220" height="88" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <rect x="740" y="300" width="220" height="30" fill="#7a7a7a"/>
    <text x="850" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">reel_hashtags</text>
    <g font-size="11" font-family="Consolas, Menlo, monospace" fill="#222222">
      <text x="750" y="348">PK,FK  reel_id      INTEGER -&gt; reels</text>
      <text x="750" y="372">PK,FK  hashtag_id   INTEGER -&gt; hashtags</text>
    </g>
  </g>
</svg>
